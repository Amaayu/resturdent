[build]
  base = "client"
  command = "npm install -g npm@latest && npm install --legacy-peer-deps && npm install vite@latest @vitejs/plugin-react@latest && npm run build"
  publish = "dist"
  functions = "../netlify/functions"

[dev]
  command = "npm run dev"
  port = 5173
  targetPort = 5001
  publish = "dist"
  autoLaunch = false

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20.19.0"
  NPM_FLAGS = "--force"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@babel/runtime"]
  included_files = [
    "../server/**/*.js",
    "../server/**/*.json",
    "../server/**/*.env*"
  ]

[dev.environment]
  NODE_ENV = "development"
  VITE_API_URL = "http://localhost:5001"

[context.production.environment]
  NODE_ENV = "production"
  VITE_API_URL = "https://your-netlify-app-url.netlify.app"

[context.deploy-preview.environment]
  NODE_ENV = "staging"
  VITE_API_URL = "https://deploy-preview-XXX--your-netlify-app.netlify.app"
